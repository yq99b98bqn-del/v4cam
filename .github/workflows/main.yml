name: Build v4h USB Pro

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot binutils build-essential perl git curl libssl-dev libfl-dev zlib1g-dev libzstd-dev
          export THEOS=/opt/theos
          sudo git clone --recursive https://github.com/theos/theos.git $THEOS
          sudo chown -R $(whoami):$(id -g) $THEOS

      - name: Setup iOS SDK
        run: |
          export THEOS=/opt/theos
          # Sửa lỗi Permission bằng cách tạo thư mục trước và cấp quyền
          mkdir -p $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Package
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          # Ép kiểu build cho kiến trúc arm64
          make package FINALPACKAGE=1
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: v4h-USB-Pro-Deb
          path: packages/*.deb
