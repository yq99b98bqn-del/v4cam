name: Build v4h USB Pro

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot binutils build-essential perl git curl libssl-dev libfl-dev zlib1g-dev libzstd-dev
          export THEOS=/opt/theos
          sudo git clone --recursive https://github.com/theos/theos.git $THEOS
          sudo chown -R $(whoami):$(id -g) $THEOS

      - name: Setup Toolchain & SDK
        run: |
          export THEOS=/opt/theos
          # Tải Toolchain từ nguồn ổn định hơn
          curl -LO https://github.com/theos/toolchain/releases/download/linux-x86_64/toolchain-linux-x86_64.tar.gz
          mkdir -p $THEOS/toolchain
          tar -xf toolchain-linux-x86_64.tar.gz -C $THEOS/toolchain
          rm toolchain-linux-x86_64.tar.gz
          
          # Tải SDK iOS
          rm -rf $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Package
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          # Build chính thức cho iPhone (arm64)
          make package FINALPACKAGE=1
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: v4h-USB-Pro-Deb
          path: packages/*.deb
